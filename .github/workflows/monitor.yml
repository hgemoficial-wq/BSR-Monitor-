name: BSR Monitor

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Rodar scraper
        run: python scraper.py

      - name: Salvar e publicar
        run: |
          git config user.name "BSR Bot"
          git config user.email "bot@bsr-monitor"
          git pull --rebase
          git add data/history.json index.html
          git diff --cached --quiet || git commit -m "BSR update"
          git push
